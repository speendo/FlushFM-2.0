; FlushFM 2.0 – PlatformIO configuration
; Hardware: ESP32-S3-D-1 N16R8 (16MB Flash, 8MB OPI PSRAM)
; See requirements/guidelines/hardware.md for hardware details
; See requirements/guidelines/build-system.md for structure conventions

[platformio]
default_envs = debug

; ---------------------------------------------------------------------------
; Shared settings
; ---------------------------------------------------------------------------
[common]
platform = espressif32@^6.0.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
upload_protocol = esptool

; ---------------------------------------------------------------------------
; Production build – no debug output, optimized for size
; ---------------------------------------------------------------------------
[env:production]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.flash_size = ${common.board_build.flash_size}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
upload_protocol = ${common.upload_protocol}
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DPRODUCTION_BUILD

; ---------------------------------------------------------------------------
; Debug build – verbose logging, assertions enabled
; ---------------------------------------------------------------------------
[env:debug]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.flash_size = ${common.board_build.flash_size}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
upload_protocol = ${common.upload_protocol}
build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DBOARD_HAS_PSRAM
    -DDEBUG_ENABLED

; ---------------------------------------------------------------------------
; Native – unit tests running on the host machine (no hardware required)
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
