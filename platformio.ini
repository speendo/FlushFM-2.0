; FlushFM 2.0 – PlatformIO configuration
; Hardware: ESP32-S3-D-1 N16R8 (16MB Flash, 8MB OPI PSRAM)
; See requirements/guidelines/hardware.md for hardware details
; See requirements/guidelines/build-system.md for structure conventions

[platformio]
default_envs = debug

; ---------------------------------------------------------------------------
; Shared settings
; ---------------------------------------------------------------------------
[common]
platform = https://github.com/platformio/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
upload_protocol = esptool
monitor_echo = yes
monitor_filters = send_on_enter

# Note: The audio library version is pinned to ensure stability; update with caution
lib_deps = https://github.com/schreibfaul1/ESP32-audioI2S.git#3.4.4

; ---------------------------------------------------------------------------
; Production build – no debug output, optimized for size
; ---------------------------------------------------------------------------
[env:production]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DPRODUCTION_BUILD

; ---------------------------------------------------------------------------
; Debug build – verbose logging, assertions enabled
; ---------------------------------------------------------------------------
[env:debug]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DBOARD_HAS_PSRAM
    -DDEBUG_ENABLED
lib_deps =
    https://github.com/schreibfaul1/ESP32-audioI2S#3.0.12

; ---------------------------------------------------------------------------
; Native – unit tests running on the host machine (no hardware required)
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++20
