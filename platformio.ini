; FlushFM 2.0 – PlatformIO configuration
; Hardware: ESP32-S3-D-1 N16R8 (16MB Flash, 8MB OPI PSRAM)
; See requirements/guidelines/hardware.md for hardware details
; See requirements/guidelines/build-system.md for structure conventions

[platformio]
default_envs = debug

; ---------------------------------------------------------------------------
; Shared settings
; ---------------------------------------------------------------------------
[common]
; pioarduino: Arduino-ESP32 3.x fork of platformio/platform-espressif32 (GCC 14.2 / IDF 5.5)
; Required because platformio/espressif32 still ships Arduino-ESP32 2.x (GCC 8.4) which
; does not support <span> needed by ESP32-audioI2S >= 3.4.x
; Pin to a specific release tag for reproducible builds; update with caution
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
upload_protocol = esptool
monitor_echo = yes
monitor_filters = send_on_enter
# ESP32-audioI2S >= 3.4.x uses <span> which requires C++20
build_unflags = -std=gnu++17

# Audio library version is pinned to ensure stability; update with caution
lib_deps = https://github.com/schreibfaul1/ESP32-audioI2S.git#3.4.5

; ---------------------------------------------------------------------------
; Production build – no debug output, optimized for size
; ---------------------------------------------------------------------------
[env:production]
extends = common
build_flags =
    -std=gnu++20
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DPRODUCTION_BUILD

; ---------------------------------------------------------------------------
; Debug build – readable logging, assertions enabled
; ---------------------------------------------------------------------------
[env:debug]
extends = common
build_flags =
    -std=gnu++20
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DDEBUG_ENABLED

; ---------------------------------------------------------------------------
; Native – unit tests running on the host machine (no hardware required)
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++20
    -Isrc
    -Ilib/audio/include
